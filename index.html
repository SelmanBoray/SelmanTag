<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>selmantag</title>
  <style>
    body { font-family: system-ui, Arial; max-width: 620px; margin: 24px auto; padding: 0 12px; }
    input, button { width: 100%; padding: 12px; margin: 8px 0; font-size: 16px; }
    button { cursor: pointer; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin-top: 12px; }
    .muted { color: #666; font-size: 14px; margin: 6px 0 10px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .list { border: 1px solid #ddd; border-radius: 10px; max-height: 190px; overflow-y: auto; margin-top: -4px; }
    .list button { text-align: left; background: #fff; border: 0; border-bottom: 1px solid #eee; margin: 0; border-radius: 0; }
    .list button:last-child { border-bottom: 0; }
    .list button:hover { background: #f6f8ff; }
  </style>
</head>
<body>
  <h2>selmantag</h2>
  <p class="muted">Konum izni vermezseniz "Başlangıç adresi" girin. Hedef için listeden seçim yapın.</p>

  <label>Başlangıç adresi (opsiyonel - konum izni yoksa gerekli)</label>
  <input id="baslangic" type="text" placeholder="örn Isparta Merkez" autocomplete="off">

  <label>Kullanıcının gitmek istediği adres</label>
  <input id="hedef" type="text" placeholder="örn Isparta Iyaşpark AVM" autocomplete="off">
  <div id="oneriler" class="list" hidden></div>

  <div class="row">
    <button id="hesaplaBtn" onclick="hesapla()">Hesapla</button>
    <button id="mapsBtn" onclick="hedefiGoogleMapsteAc()" disabled>Google Maps'te Aç</button>
  </div>

  <div class="card" id="sonuc">Sonuç burada görünecek</div>

<script>
const AKKENT_TOKI_ADRESI = "Akkent TOKİ, Isparta";
const OPET_URL = "https://www.opet.com.tr/akaryakit-fiyatlari/isparta";
const YEDEK_BENZIN = 59.23;
let hedefMapsLinki = "";
let autocompleteTimer;
let seciliHedef = null;

function yaz(metin) {
  document.getElementById("sonuc").innerHTML = metin;
}

function geolocAl() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error("Tarayıcı konum özelliğini desteklemiyor"));
    navigator.geolocation.getCurrentPosition(
      (p) => resolve({ lat: p.coords.latitude, lon: p.coords.longitude }),
      () => reject(new Error("Konum alınamadı")),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  });
}

async function adresAra(adres, limit = 1) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=${limit}&countrycodes=tr&q=${encodeURIComponent(adres)}`;
  const r = await fetch(url, { headers: { Accept: "application/json" } });
  if (!r.ok) throw new Error(`Adres bulunamadı: ${adres}`);
  return await r.json();
}

async function adresToCoord(adres) {
  const list = await adresAra(adres, 1);
  if (!Array.isArray(list) || !list.length) throw new Error(`Adres bulunamadı: ${adres}`);
  return { lat: Number(list[0].lat), lon: Number(list[0].lon), ad: list[0].display_name };
}

async function rotaKm(a, b) {
  const url = `https://router.project-osrm.org/route/v1/driving/${a.lon},${a.lat};${b.lon},${b.lat}?overview=false`;
  const r = await fetch(url);
  if (!r.ok) throw new Error("Mesafe servisine ulaşılamadı");
  const d = await r.json();
  const metre = d?.routes?.[0]?.distance;
  if (!Number.isFinite(metre)) throw new Error("Mesafe hesaplanamadı");
  return metre / 1000;
}

async function benzinGetir() {
  const kaynaklar = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(OPET_URL)}`,
    "https://r.jina.ai/http://www.opet.com.tr/akaryakit-fiyatlari/isparta"
  ];

  for (const url of kaynaklar) {
    try {
      const r = await fetch(url);
      if (!r.ok) continue;
      const html = await r.text();
      const satir = /Kurşunsuz\s*Benzin\s*95\s*\(?\s*Ultra\s*Force\s*95\s*\)?/i;
      const fiyat = /(\d{1,3}[.,]\d{2})\s*(?:TL|₺)/g;
      const idx = html.search(satir);
      if (idx < 0) continue;
      const parcasi = html.slice(Math.max(0, idx - 2500), idx + 3000);
      const m = [...parcasi.matchAll(fiyat)];
      if (!m.length) continue;
      return Number(m[0][1].replace(",", "."));
    } catch {}
  }
  return YEDEK_BENZIN;
}

function onerileriBastir(items) {
  const box = document.getElementById("oneriler");
  if (!items.length) {
    box.hidden = true;
    box.innerHTML = "";
    return;
  }

  box.innerHTML = items.map((x, i) => (
    `<button type="button" data-idx="${i}">${x.ad}</button>`
  )).join("");

  box.dataset.items = JSON.stringify(items);
  box.hidden = false;
}

async function adresOnerisiGetir(sorgu) {
  if (sorgu.length < 3) return onerileriBastir([]);

  const [a, b] = await Promise.all([
    adresAra(sorgu, 6).catch(() => []),
    adresAra(`${sorgu}, Isparta`, 6).catch(() => [])
  ]);

  const birlesik = [...a, ...b]
    .map((x) => ({ ad: x.display_name, lat: Number(x.lat), lon: Number(x.lon) }))
    .filter((x) => x.ad && Number.isFinite(x.lat) && Number.isFinite(x.lon));

  const uniq = [];
  const seen = new Set();
  for (const it of birlesik) {
    if (seen.has(it.ad)) continue;
    seen.add(it.ad);
    uniq.push(it);
    if (uniq.length >= 8) break;
  }

  onerileriBastir(uniq);
}

function hedefiGoogleMapsteAc() {
  if (!hedefMapsLinki) return;
  window.open(hedefMapsLinki, "_blank", "noopener,noreferrer");
}

async function kullaniciKonumuGetir() {
  const manuel = document.getElementById("baslangic").value.trim();
  if (manuel) return adresToCoord(manuel);

  try {
    const g = await geolocAl();
    return { lat: g.lat, lon: g.lon, ad: `${g.lat},${g.lon}` };
  } catch {
    throw new Error("Konum alınamadı. Başlangıç adresi girin veya konum izni verin.");
  }
}

async function hesapla() {
  const hedefText = document.getElementById("hedef").value.trim();
  const btn = document.getElementById("hesaplaBtn");
  const mapsBtn = document.getElementById("mapsBtn");

  if (!hedefText) return yaz("Lütfen gitmek istediğiniz adresi yazın");

  btn.disabled = true;
  mapsBtn.disabled = true;
  hedefMapsLinki = "";
  yaz("Hesaplanıyor...");

  try {
    const hedefCoord = seciliHedef || await adresToCoord(hedefText);

    const [benzin, user, akkent] = await Promise.all([
      benzinGetir(),
      kullaniciKonumuGetir(),
      adresToCoord(AKKENT_TOKI_ADRESI)
    ]);

    const evuzaklik = await rotaKm(user, akkent);
    const userToHedef = await rotaKm(user, hedefCoord);
    const hedefToAkkent = await rotaKm(hedefCoord, akkent);
    const toplamuzaklik = userToHedef + hedefToAkkent;

    hedefMapsLinki = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(user.ad)}&destination=${encodeURIComponent(hedefCoord.ad || hedefText)}`;
    mapsBtn.disabled = false;

    yaz(
      `benzin (Kurşunsuz Benzin 95 / Ultra Force 95): <b>${benzin.toFixed(2)} TL</b><br>` +
      `evuzaklik (kullanıcı konumu → Akkent TOKİ): <b>${evuzaklik.toFixed(2)} km</b><br>` +
      `toplamuzaklik (kullanıcı konumu → hedef + hedef → Akkent TOKİ): <b>${toplamuzaklik.toFixed(2)} km</b>`
    );
  } catch (e) {
    yaz(`Hata: ${e.message}`);
  } finally {
    btn.disabled = false;
  }
}

document.getElementById("hedef").addEventListener("input", (e) => {
  seciliHedef = null;
  clearTimeout(autocompleteTimer);
  autocompleteTimer = setTimeout(() => {
    adresOnerisiGetir(e.target.value.trim()).catch(() => onerileriBastir([]));
  }, 250);
});

document.getElementById("oneriler").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-idx]");
  if (!btn) return;

  const items = JSON.parse(document.getElementById("oneriler").dataset.items || "[]");
  const secim = items[Number(btn.dataset.idx)];
  if (!secim) return;

  seciliHedef = secim;
  document.getElementById("hedef").value = secim.ad;
  onerileriBastir([]);
});
</script>
</body>
</html>
