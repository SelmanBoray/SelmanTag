<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>selmantag</title>
  <style>
    body { font-family: system-ui, Arial; max-width: 640px; margin: 24px auto; padding: 0 12px; }
    input, button { width: 100%; padding: 12px; margin: 8px 0; font-size: 16px; }
    button { cursor: pointer; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; margin-top: 12px; }
    .muted { color: #666; font-size: 14px; margin: 6px 0 10px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .list { border: 1px solid #ddd; border-radius: 10px; max-height: 170px; overflow-y: auto; margin-top: -4px; }
    .list button { text-align: left; background: #fff; border: 0; border-bottom: 1px solid #eee; margin: 0; border-radius: 0; }
    .list button:last-child { border-bottom: 0; }
    .list button:hover { background: #f6f8ff; }
  </style>
</head>
<body>
  <h2>selmantag</h2>
  <p class="muted">Başlangıç ve hedef için öneri listesi gelir. Konum erişilemezse tekrar konum izni istenir.</p>

  <label>Başlangıç adresi (boş bırakırsanız konum kullanılır)</label>
  <input id="baslangic" type="text" placeholder="örn Isparta Merkez" autocomplete="off">
  <div id="onerilerBaslangic" class="list" hidden></div>

  <label>Gitmek istediğiniz adres</label>
  <input id="hedef" type="text" placeholder="örn Isparta Iyaşpark AVM" autocomplete="off">
  <div id="onerilerHedef" class="list" hidden></div>

  <div class="row">
    <button id="hesaplaBtn" onclick="hesapla()">Hesapla</button>
    <button id="mapsBtn" onclick="hedefiGoogleMapsteAc()" disabled>Google Maps'te Aç</button>
  </div>


  <div class="card">
    <h3>KM ile Hızlı Hesap</h3>
    <label>Eve uzaklık (km)</label>
    <input id="ev" type="number" step="0.01" placeholder="örn 5">

    <label>Toplam uzaklık (km)</label>
    <input id="toplam" type="number" step="0.01" placeholder="örn 20">

    <button onclick="hesaplaKm()">KM ile Hesapla</button>
  </div>

  <div class="card" id="sonuc">Sonuç burada görünecek</div>

<script>
const AKKENT_TOKI_ADRESI = "Akkent TOKİ, Isparta";
const OPET_URL = "https://www.opet.com.tr/akaryakit-fiyatlari/isparta";
const YEDEK_BENZIN = 62;
const YUZKM_LT = 8;
const KM_LT = YUZKM_LT / 100;
const coordCache = new Map();

let hedefMapsLinki = "";
let timerBaslangic;
let timerHedef;
let seciliBaslangic = null;
let seciliHedef = null;

function yaz(metin) {
  document.getElementById("sonuc").innerHTML = metin;
}

function timeoutFetch(url, options = {}, ms = 7000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { ...options, signal: ctrl.signal }).finally(() => clearTimeout(t));
}

function geolocBirKere() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error("Tarayıcı konum özelliğini desteklemiyor"));
    navigator.geolocation.getCurrentPosition(
      (p) => resolve({ lat: p.coords.latitude, lon: p.coords.longitude }),
      () => reject(new Error("Konum alınamadı")),
      { enableHighAccuracy: true, timeout: 9000, maximumAge: 0 }
    );
  });
}

async function geolocAlTekrarli() {
  try {
    return await geolocBirKere();
  } catch {
    yaz("Konum alınamadı, tekrar isteniyor...");
    return geolocBirKere();
  }
}

async function reverseGeocode(lat, lon) {
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}`;
    const r = await timeoutFetch(url, { headers: { Accept: "application/json" } }, 5000);
    if (!r.ok) throw new Error();
    const d = await r.json();
    return d?.display_name || `${lat},${lon}`;
  } catch {
    return `${lat},${lon}`;
  }
}

async function adresAra(adres, limit = 1) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=${limit}&countrycodes=tr&q=${encodeURIComponent(adres)}`;
  const r = await timeoutFetch(url, { headers: { Accept: "application/json" } }, 6000);
  if (!r.ok) throw new Error(`Adres bulunamadı: ${adres}`);
  return await r.json();
}

async function adresToCoord(adres) {
  const key = adres.trim().toLowerCase();
  if (coordCache.has(key)) return coordCache.get(key);

  const list = await adresAra(adres, 1);
  if (!Array.isArray(list) || !list.length) throw new Error(`Adres bulunamadı: ${adres}`);
  const value = { lat: Number(list[0].lat), lon: Number(list[0].lon), ad: list[0].display_name };
  coordCache.set(key, value);
  return value;
}

async function rotaKm(a, b) {
  const url = `https://router.project-osrm.org/route/v1/driving/${a.lon},${a.lat};${b.lon},${b.lat}?overview=false`;
  const r = await timeoutFetch(url, {}, 6000);
  if (!r.ok) throw new Error("Mesafe servisine ulaşılamadı");
  const d = await r.json();
  const metre = d?.routes?.[0]?.distance;
  if (!Number.isFinite(metre)) throw new Error("Mesafe hesaplanamadı");
  return metre / 1000;
}

async function benzinGetir() {
  const kaynaklar = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(OPET_URL)}`,
    "https://r.jina.ai/http://www.opet.com.tr/akaryakit-fiyatlari/isparta"
  ];

  for (const url of kaynaklar) {
    try {
      const r = await timeoutFetch(url, {}, 4500);
      if (!r.ok) continue;
      const html = await r.text();
      const satir = /Kurşunsuz\s*Benzin\s*95\s*\(?\s*Ultra\s*Force\s*95\s*\)?/i;
      const fiyat = /(\d{1,3}[.,]\d{2})\s*(?:TL|₺)/g;
      const idx = html.search(satir);
      if (idx < 0) continue;
      const parcasi = html.slice(Math.max(0, idx - 2500), idx + 3000);
      const m = [...parcasi.matchAll(fiyat)];
      if (!m.length) continue;
      return Number(m[0][1].replace(",", "."));
    } catch {}
  }
  return YEDEK_BENZIN;
}

function onerileriBastir(listId, items) {
  const box = document.getElementById(listId);
  if (!items.length) {
    box.hidden = true;
    box.innerHTML = "";
    return;
  }
  box.innerHTML = items.map((x, i) => (`<button type="button" data-idx="${i}">${x.ad}</button>`)).join("");
  box.dataset.items = JSON.stringify(items);
  box.hidden = false;
}

async function adresOnerisiGetir(sorgu, listId) {
  if (sorgu.length < 3) return onerileriBastir(listId, []);

  const [a, b] = await Promise.all([
    adresAra(sorgu, 6).catch(() => []),
    adresAra(`${sorgu}, Isparta`, 6).catch(() => [])
  ]);

  const birlesik = [...a, ...b]
    .map((x) => ({ ad: x.display_name, lat: Number(x.lat), lon: Number(x.lon) }))
    .filter((x) => x.ad && Number.isFinite(x.lat) && Number.isFinite(x.lon));

  const uniq = [];
  const seen = new Set();
  for (const it of birlesik) {
    if (seen.has(it.ad)) continue;
    seen.add(it.ad);
    uniq.push(it);
    if (uniq.length >= 8) break;
  }

  onerileriBastir(listId, uniq);
}

function hedefiGoogleMapsteAc() {
  if (!hedefMapsLinki) return;
  window.open(hedefMapsLinki, "_blank", "noopener,noreferrer");
}

async function kullaniciKonumuGetir() {
  const manuel = document.getElementById("baslangic").value.trim();
  if (manuel) return seciliBaslangic || adresToCoord(manuel);

  try {
    const g = await geolocAlTekrarli();
    const ad = await reverseGeocode(g.lat, g.lon);
    return { lat: g.lat, lon: g.lon, ad };
  } catch {
    throw new Error("Konum alınamadı. Lütfen konum iznini açıp tekrar deneyin veya başlangıç adresi girin.");
  }
}

function hesaplaToplamTutar(kmyol, benzin) {
  const toplamyakit = kmyol * KM_LT;
  let toplamtutar = toplamyakit * benzin;
  const sure = kmyol * 1.2;

  if (sure < 10) toplamtutar += sure * 1.5 + 20;
  else if (sure < 20) toplamtutar += sure * 2;
  else if (sure < 30) toplamtutar += sure * 2.3;
  else toplamtutar += sure * 2.5;

  return toplamtutar;
}


function hesaplaKm() {
  const evuzaklik = Number(document.getElementById("ev").value);
  const toplamuzaklik = Number(document.getElementById("toplam").value);

  if (!Number.isFinite(evuzaklik) || !Number.isFinite(toplamuzaklik)) {
    yaz("Lütfen eve uzaklık ve toplam uzaklık alanlarını sayı girin.");
    return;
  }

  if (toplamuzaklik < evuzaklik) {
    yaz("Toplam uzaklık, eve uzaklıktan küçük olamaz.");
    return;
  }

  benzinGetir().then((benzin) => {
    const kmyol = Math.max(0, toplamuzaklik - evuzaklik);
    const toplamtutar = hesaplaToplamTutar(kmyol, benzin);
    yaz(`Toplam Tutar: <b>${toplamtutar.toFixed(2)} TL</b>`);
  }).catch((e) => {
    yaz(`Hata: ${e.message}`);
  });
}

async function hesapla() {
  const hedefText = document.getElementById("hedef").value.trim();
  const btn = document.getElementById("hesaplaBtn");
  const mapsBtn = document.getElementById("mapsBtn");
  if (!hedefText) return yaz("Lütfen gitmek istediğiniz adresi yazın");

  btn.disabled = true;
  mapsBtn.disabled = true;
  hedefMapsLinki = "";
  yaz("Hesaplanıyor...");

  try {
    const [benzin, user, akkent, hedefCoord] = await Promise.all([
      benzinGetir(),
      kullaniciKonumuGetir(),
      adresToCoord(AKKENT_TOKI_ADRESI),
      Promise.resolve(seciliHedef).then((x) => x || adresToCoord(hedefText))
    ]);

    const [evuzaklik, userToHedef, hedefToAkkent] = await Promise.all([
      rotaKm(user, akkent),
      rotaKm(user, hedefCoord),
      rotaKm(hedefCoord, akkent)
    ]);

    const toplamuzaklik = userToHedef + hedefToAkkent;
    const kmyol = Math.max(0, toplamuzaklik - evuzaklik);
    const toplamtutar = hesaplaToplamTutar(kmyol, benzin);

    hedefMapsLinki = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(user.ad)}&destination=${encodeURIComponent(hedefCoord.ad || hedefText)}`;
    mapsBtn.disabled = false;

    yaz(`Toplam Tutar: <b>${toplamtutar.toFixed(2)} TL</b>`);
  } catch (e) {
    yaz(`Hata: ${e.message}`);
  } finally {
    btn.disabled = false;
  }
}

document.getElementById("baslangic").addEventListener("input", (e) => {
  seciliBaslangic = null;
  clearTimeout(timerBaslangic);
  timerBaslangic = setTimeout(() => {
    adresOnerisiGetir(e.target.value.trim(), "onerilerBaslangic").catch(() => onerileriBastir("onerilerBaslangic", []));
  }, 200);
});

document.getElementById("hedef").addEventListener("input", (e) => {
  seciliHedef = null;
  clearTimeout(timerHedef);
  timerHedef = setTimeout(() => {
    adresOnerisiGetir(e.target.value.trim(), "onerilerHedef").catch(() => onerileriBastir("onerilerHedef", []));
  }, 200);
});

document.getElementById("onerilerBaslangic").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-idx]");
  if (!btn) return;
  const items = JSON.parse(document.getElementById("onerilerBaslangic").dataset.items || "[]");
  const secim = items[Number(btn.dataset.idx)];
  if (!secim) return;
  seciliBaslangic = secim;
  document.getElementById("baslangic").value = secim.ad;
  onerileriBastir("onerilerBaslangic", []);
});

document.getElementById("onerilerHedef").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-idx]");
  if (!btn) return;
  const items = JSON.parse(document.getElementById("onerilerHedef").dataset.items || "[]");
  const secim = items[Number(btn.dataset.idx)];
  if (!secim) return;
  seciliHedef = secim;
  document.getElementById("hedef").value = secim.ad;
  onerileriBastir("onerilerHedef", []);
});
</script>
</body>
</html>
